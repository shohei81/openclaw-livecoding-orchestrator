<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <title>openclaw livecoding</title>
  <style>
    html, body { margin: 0; padding: 0; background: #000; color: #ddd; font-family: ui-monospace, monospace; }
    #hydra { position: fixed; inset: 0; z-index: 0; }
    #overlay {
      position: fixed; inset: 0; z-index: 1; padding: 12px;
      display: grid; grid-template-columns: 1fr 1fr; grid-template-rows: 1fr 1fr; gap: 8px;
      pointer-events: none;
    }
    .pane {
      background: rgba(0,0,0,0.55); border: 1px solid #333; border-radius: 6px;
      padding: 8px; font-size: 12px; overflow: hidden;
      backdrop-filter: blur(2px);
    }
    .pane h3 { margin: 0 0 4px; font-size: 12px; color: #8cf; }
    .pane pre { margin: 0; white-space: pre-wrap; word-break: break-all; }
    #status { position: fixed; bottom: 8px; left: 8px; z-index: 2; font-size: 11px; color: #6c6; pointer-events: none; }
    #start-overlay {
      position: fixed; inset: 0; z-index: 10;
      display: flex; align-items: center; justify-content: center;
      background: rgba(0,0,0,0.85); cursor: pointer; user-select: none;
    }
    #start-overlay .panel {
      padding: 24px 32px; border: 1px solid #444; border-radius: 10px;
      text-align: center; font-size: 14px; color: #ddd;
    }
    #start-overlay .big { font-size: 18px; color: #fff; margin-bottom: 8px; }
    #diag { position: fixed; top: 8px; right: 8px; z-index: 2; font-size: 11px; color: #8cf;
      background: rgba(0,0,0,0.6); padding: 4px 8px; border-radius: 4px; pointer-events: none; }
  </style>
</head>
<body>
  <canvas id="hydra"></canvas>
  <div id="overlay">
    <div class="pane" data-agent="strudel-drums"><h3>strudel-drums</h3><pre></pre></div>
    <div class="pane" data-agent="strudel-bass"><h3>strudel-bass</h3><pre></pre></div>
    <div class="pane" data-agent="strudel-lead"><h3>strudel-lead</h3><pre></pre></div>
    <div class="pane" data-agent="hydra"><h3>hydra</h3><pre></pre></div>
  </div>
  <div id="status">connecting…</div>
  <div id="diag">audio: ? | hydra: ?</div>
  <div id="start-overlay">
    <div class="panel">
      <div class="big">Click anywhere to start</div>
      <div>Resumes AudioContext + kicks Hydra render</div>
    </div>
  </div>

  <!-- Hydra UMD bundle (includes raf-loop). The ESM build via esm.sh doesn't
       wire autoLoop, leaving the canvas frozen on the first frame. -->
  <script src="https://unpkg.com/hydra-synth@1.3.29/dist/hydra-synth.js"></script>
  <script type="module" src="./app.js"></script>
</body>
</html>
