name: openclaw-livecoding

x-agent: &agent
  build: ./agents/base
  environment: &agent-env
    REDIS_URL: redis://redis:6379
    VALIDATOR_URL: http://validator:8081
    SESSION_ID: ${SESSION_ID:-session-001}
    SESSION_DIR: /session
    NVIDIA_API_KEY: ${NVIDIA_API_KEY}
    NVIDIA_BASE_URL: ${NVIDIA_BASE_URL:-https://integrate.api.nvidia.com/v1}
    NVIDIA_MODEL: ${NVIDIA_MODEL:-qwen/qwen2.5-coder-32b-instruct}
    EDIT_EVERY_N_BARS: ${EDIT_EVERY_N_BARS:-8}
    TEMPERATURE: ${TEMPERATURE:-0.8}
  volumes: &agent-volumes
    - ./session:/session
  depends_on: &agent-deps
    redis:
      condition: service_healthy
    validator:
      condition: service_started
    conductor:
      condition: service_started
  restart: unless-stopped

services:
  redis:
    image: redis:7-alpine
    ports:
      - "${REDIS_PORT:-6379}:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  livecoding-host:
    build: ./livecoding-host
    ports:
      - "${LIVECODING_HOST_PORT:-8080}:8080"
    environment:
      REDIS_URL: redis://redis:6379
      SESSION_ID: ${SESSION_ID:-session-001}
    volumes:
      - ./session:/app/session
    depends_on:
      redis:
        condition: service_healthy

  validator:
    build: ./validator
    ports:
      - "${VALIDATOR_PORT:-8081}:8081"
    environment:
      PORT: 8081

  conductor:
    build: ./conductor
    environment:
      REDIS_URL: redis://redis:6379
      SESSION_ID: ${SESSION_ID:-session-001}
      BPM: ${BPM:-110}
      BEATS_PER_BAR: ${BEATS_PER_BAR:-4}
    depends_on:
      redis:
        condition: service_healthy

  # ---------------------------------------------------------------
  # Phase (c): thin agent containers calling NIM directly.
  # Phase (a) will replace these with OpenClaw Gateway + sidecar pairs.
  # Edits are staggered via EDIT_PHASE_OFFSET so they don't all fire on
  # the same bar.
  # ---------------------------------------------------------------

  agent-strudel-drums:
    <<: *agent
    environment:
      <<: *agent-env
      AGENT_ID: strudel-drums
      AGENT_ROLE: strudel
      PROMPT_PATH: /prompt.md
      EDIT_PHASE_OFFSET: 0
    volumes:
      - ./session:/session
      - ./agents/strudel-drums/prompt.md:/prompt.md:ro

  agent-strudel-bass:
    <<: *agent
    environment:
      <<: *agent-env
      AGENT_ID: strudel-bass
      AGENT_ROLE: strudel
      PROMPT_PATH: /prompt.md
      EDIT_PHASE_OFFSET: 2
    volumes:
      - ./session:/session
      - ./agents/strudel-bass/prompt.md:/prompt.md:ro

  agent-strudel-lead:
    <<: *agent
    environment:
      <<: *agent-env
      AGENT_ID: strudel-lead
      AGENT_ROLE: strudel
      PROMPT_PATH: /prompt.md
      EDIT_PHASE_OFFSET: 4
    volumes:
      - ./session:/session
      - ./agents/strudel-lead/prompt.md:/prompt.md:ro

  agent-hydra:
    <<: *agent
    environment:
      <<: *agent-env
      AGENT_ID: hydra
      AGENT_ROLE: hydra
      PROMPT_PATH: /prompt.md
      EDIT_PHASE_OFFSET: 6
    volumes:
      - ./session:/session
      - ./agents/hydra/prompt.md:/prompt.md:ro
