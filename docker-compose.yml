name: openclaw-livecoding

# Phase (a): each agent runs an OpenClaw Gateway + sidecar loop in one
# container. The image is FROM openclaw:local — build that first:
#   docker build -t openclaw:local ./third_party/openclaw
# (third_party/openclaw is gitignored; see README for clone instructions.)
x-agent: &agent
  build: ./agents/loop
  environment: &agent-env
    REDIS_URL: redis://redis:6379
    VALIDATOR_URL: http://validator:8081
    SESSION_ID: ${SESSION_ID:-session-001}
    SESSION_DIR: /session
    NVIDIA_API_KEY: ${NVIDIA_API_KEY}
    NVIDIA_BASE_URL: ${NVIDIA_BASE_URL:-https://integrate.api.nvidia.com/v1}
    GEMINI_API_KEY: ${GEMINI_API_KEY}
    EDIT_EVERY_N_BARS: ${EDIT_EVERY_N_BARS:-16}
    OPENCLAW_THINKING: ${OPENCLAW_THINKING:-low}
  volumes: &agent-volumes
    - ./session:/session
  depends_on: &agent-deps
    redis:
      condition: service_healthy
    validator:
      condition: service_started
    conductor:
      condition: service_started
  restart: unless-stopped

services:
  redis:
    image: redis:7-alpine
    ports:
      - "${REDIS_PORT:-6379}:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  livecoding-host:
    build: ./livecoding-host
    ports:
      - "${LIVECODING_HOST_PORT:-8080}:8080"
    environment:
      REDIS_URL: redis://redis:6379
      SESSION_ID: ${SESSION_ID:-session-001}
    volumes:
      - ./session:/app/session
    depends_on:
      redis:
        condition: service_healthy

  validator:
    build: ./validator
    ports:
      - "${VALIDATOR_PORT:-8081}:8081"
    environment:
      PORT: 8081

  conductor:
    build: ./conductor
    environment:
      REDIS_URL: redis://redis:6379
      SESSION_ID: ${SESSION_ID:-session-001}
      BPM: ${BPM:-110}
      BEATS_PER_BAR: ${BEATS_PER_BAR:-4}
    depends_on:
      redis:
        condition: service_healthy

  agent-strudel-drums:
    <<: *agent
    environment:
      <<: *agent-env
      AGENT_ID: strudel-drums
      AGENT_ROLE: strudel
      EDIT_PHASE_OFFSET: 0
    volumes:
      - ./session:/session
      - ./agents/homes/strudel-drums:/home/node/.openclaw
      - ./agents/homes/strudel-drums/workspace:/workspace

  agent-strudel-bass:
    <<: *agent
    environment:
      <<: *agent-env
      AGENT_ID: strudel-bass
      AGENT_ROLE: strudel
      EDIT_PHASE_OFFSET: 2
    volumes:
      - ./session:/session
      - ./agents/homes/strudel-bass:/home/node/.openclaw
      - ./agents/homes/strudel-bass/workspace:/workspace

  agent-strudel-lead:
    <<: *agent
    environment:
      <<: *agent-env
      AGENT_ID: strudel-lead
      AGENT_ROLE: strudel
      EDIT_PHASE_OFFSET: 4
    volumes:
      - ./session:/session
      - ./agents/homes/strudel-lead:/home/node/.openclaw
      - ./agents/homes/strudel-lead/workspace:/workspace

  agent-hydra:
    <<: *agent
    environment:
      <<: *agent-env
      AGENT_ID: hydra
      AGENT_ROLE: hydra
      EDIT_PHASE_OFFSET: 6
    volumes:
      - ./session:/session
      - ./agents/homes/hydra:/home/node/.openclaw
      - ./agents/homes/hydra/workspace:/workspace
